name: Continuous Deployment

on:
  push:
    branches:
      - main
jobs:
  cd:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with: 
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd CicdDemo
            docker compose -f docker/deployment/app.yml pull
            docker compose -f docker/deployment/app.yml up -d
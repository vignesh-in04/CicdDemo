version: "3.9"

services:
  web:
    build:
      context: 
      dockerfile:
    container_name:
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment: 
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"